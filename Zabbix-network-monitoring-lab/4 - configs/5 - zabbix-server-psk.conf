
=================================================
PSK Encryption Configuration
=================================================

Purpose:
Secure communication between Zabbix Server and Agents.

Server Configuration:

TLSConnect=psk
TLSAccept=psk
TLSPSKIdentity=Windows-PSK
TLSPSKFile=/etc/zabbix/zabbix_agentd.psk

Verification:

Host -> Encryption

Expected Result:
Host status remains Available using encrypted communication.

Security Benefit:
Protects monitoring traffic from interception.
